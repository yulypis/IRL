<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IRL Pro Bulletproof Overlay</title>
    <style>
        @import url('https://googleapis.com');
        body {
            margin: 0;
            padding: 10px;
            overflow: hidden;
            background-color: transparent;
        }
        #overlay-container {
            display: inline-flex;
            align-items: center;
            background: rgba(0, 0, 0, 0.65);
            color: #ffffff;
            font-family: 'Poppins', sans-serif;
            font-size: 24px;
            padding: 12px 20px;
            border-radius: 8px;
            border-left: 5px solid #00ffcc;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.8);
        }
    </style>
</head>
<body>

    <div id="overlay-container">
        📍 <span id="display-text">Waiting for GPS...</span>
    </div>

    <script>
        const UPDATE_INTERVAL = 600000; // 10 minutes

        function updateOverlay() {
            if (!navigator.geolocation) {
                document.getElementById('display-text').innerText = "GPS Not Supported";
                return;
            }

            navigator.geolocation.getCurrentPosition(async (position) => {
                const lat = position.coords.latitude;
                const lon = position.coords.longitude;

                try {
                    // Pulls both weather data and location string in one single request 
                    const response = await fetch(`https://wttr.in{lat},${lon}?format=j1`);
                    const data = await response.json();

                    // Grabs the town or area name
                    const city = data.nearest_weather[0].areaName[0].value;
                    // Grabs the temperature in Celsius
                    const temp = data.current_condition[0].temp_C;

                    document.getElementById('display-text').innerText = `${city} | ${temp}°C`;

                } catch (error) {
                    // Shows the real technical block on screen if it breaks again
                    document.getElementById('display-text').innerText = "API Error: " + error.message;
                }
            }, (error) => {
                document.getElementById('display-text').innerText = "Allow Location Access";
            }, {
                enableHighAccuracy: false // Keeps battery use low
            });
        }

        updateOverlay();
        setInterval(updateOverlay, UPDATE_INTERVAL);
    </script>

</body>
</html>
