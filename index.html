<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IRL Pro Weather Overlay</title>
    <style>
        @import url('https://googleapis.com');
        body {
            margin: 0;
            padding: 10px;
            overflow: hidden;
            background-color: transparent; 
        }
        #overlay-container {
            display: inline-flex;
            align-items: center;
            background: rgba(0, 0, 0, 0.65);
            color: #ffffff;
            font-family: 'Poppins', sans-serif;
            font-size: 24px;
            padding: 12px 20px;
            border-radius: 8px;
            border-left: 5px solid #00ffcc;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.8);
        }
    </style>
</head>
<body>

    <div id="overlay-container">
        📍 <span id="display-text">Requesting Location...</span>
    </div>

    <script>
        // Paste your actual OpenWeather API key inside these quotes
        const API_KEY = "83908861cf86cdbf5883ef5752c00227"; 
        
        const UPDATE_INTERVAL = 600000; // 10 minutes

        async function updateOverlay() {
            if (!navigator.geolocation) {
                document.getElementById('display-text').innerText = "Error: No GPS Support";
                return;
            }

            navigator.geolocation.getCurrentPosition(async (position) => {
                const lat = position.coords.latitude;
                const lon = position.coords.longitude;

                // CORRECTED: Fully qualified URL structure with the required /data/2.5/weather path
                const url = "https://api.openweathermap.org/data/2.5/weather?lat=" + lat + "&lon=" + lon + "&units=metric&appid=" + API_KEY;
                
                try {
                    const response = await fetch(url);
                    const data = await response.json();

                    if (response.ok) {
                        const city = data.name;
                        const temp = Math.round(data.main.temp);
                        document.getElementById('display-text').innerText = city + " | " + temp + "°C";
                    } else {
                        document.getElementById('display-text').innerText = "API Error: (" + response.status + ") " + data.message;
                    }

                } catch (networkError) {
                    document.getElementById('display-text').innerText = "Fetch Failed: " + networkError.message;
                }
            }, (geoError) => {
                document.getElementById('display-text').innerText = "GPS Blocked: " + geoError.message;
            }, {
                enableHighAccuracy: false 
            });
        }

        updateOverlay();
        setInterval(updateOverlay, UPDATE_INTERVAL);
    </script>

</body>
</html>
