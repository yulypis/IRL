<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IRL Pro Safe Overlay</title>
    <style>
        @import url('https://googleapis.com');
        body {
            margin: 0;
            padding: 10px;
            overflow: hidden;
            background-color: transparent;
        }
        #overlay-container {
            display: inline-flex;
            align-items: center;
            background: rgba(0, 0, 0, 0.65);
            color: #ffffff;
            font-family: 'Poppins', sans-serif;
            font-size: 24px;
            padding: 12px 20px;
            border-radius: 8px;
            border-left: 5px solid #00ffcc;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.8);
        }
    </style>
</head>
<body>

    <div id="overlay-container">
        📍 <span id="display-text">Loading...</span>
    </div>

    <script>
        async function updateOverlay() {
            if (!navigator.geolocation) return;

            navigator.geolocation.getCurrentPosition(async (position) => {
                const lat = position.coords.latitude;
                const lon = position.coords.longitude;

                try {
                    // 100% free public endpoints. No registration or keys required at all.
                    const geoUrl = `https://bigdatacloud.net{lat}&longitude=${lon}&localityLanguage=en`;
                    const weatherUrl = `https://open-meteo.com{lat}&longitude=${lon}&current_weather=true`;

                    const [geoRes, weatherRes] = await Promise.all([fetch(geoUrl), fetch(weatherUrl)]);
                    const geoData = await geoRes.json();
                    const weatherData = await weatherRes.json();

                    // Grabs only the city/settlement name and the temperature
                    const city = geoData.locality || geoData.city || "Unknown";
                    const temp = Math.round(weatherData.current_weather.temperature);

                    document.getElementById('display-text').innerText = `${city} | ${temp}°C`;
                } catch (e) {
                    document.getElementById('display-text').innerText = "Update Error";
                }
            }, (err) => {
                document.getElementById('display-text').innerText = "Turn on Phone GPS";
            }, { enableHighAccuracy: false });
        }

        updateOverlay();
        setInterval(updateOverlay, 600000); // Automatically updates every 10 minutes
    </script>

</body>
</html>
